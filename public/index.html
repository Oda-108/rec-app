<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rec - 画面録画 & 共有</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23ef4444'/><circle cx='50' cy='50' r='18' fill='white'/></svg>">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- ===== Toast Container ===== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ===== Confirm Dialog ===== -->
  <div class="confirm-overlay hidden" id="confirmOverlay">
    <div class="confirm-dialog">
      <div class="confirm-message" id="confirmMessage"></div>
      <div class="confirm-actions">
        <button class="btn" id="confirmCancel">キャンセル</button>
        <button class="btn btn-danger" id="confirmOk">削除</button>
      </div>
    </div>
  </div>

  <!-- ===== Header ===== -->
  <header class="header">
    <div class="header-brand">
      <span class="logo">Rec</span>
      <span class="subtitle">画面録画 & 共有</span>
    </div>
    <button class="header-back hidden" id="backBtn" title="録画一覧に戻る">← 戻る</button>
  </header>

  <!-- ===== Record Page ===== -->
  <div id="recordPage" class="page record-page active">

    <!-- Record button -->
    <button class="main-rec-btn" id="mainRecBtn" title="録画を開始 (⌘⇧R)">
      <span class="main-rec-inner"></span>
    </button>
    <div class="main-rec-label" id="mainRecLabel">録画を開始</div>

    <!-- Recording status indicator (from control window) -->
    <div class="recording-status hidden" id="recordingStatus">
      <span class="status-dot"></span>
      <span class="recording-status-text">録画中...</span>
      <button class="recording-stop-btn" id="recordingStopBtn">■ 停止</button>
    </div>

    <!-- Recordings list -->
    <div class="recordings-section">
      <div class="recordings-title">録画一覧</div>
      <div id="recordingsList"></div>
    </div>
  </div>

  <!-- ===== Player Page ===== -->
  <div id="playerPage" class="page player-page">
    <div class="player-title-wrap">
      <input class="player-title" id="playerTitle" value="" placeholder="タイトルを入力">
    </div>
    <div class="player-video-wrap">
      <video id="playerVideo" controls></video>
      <canvas id="mosaicCanvas" class="mosaic-canvas hidden"></canvas>
    </div>
    <div class="player-actions">
      <button class="btn btn-primary" id="downloadBtn" title="動画をダウンロード">↓ ダウンロード</button>
      <button class="btn btn-danger" id="deleteBtn" title="この録画を削除">✕ 削除</button>
      <span class="meta" id="playerMeta"></span>
    </div>

    <!-- Trim -->
    <div class="trim-section">
      <div class="section-header">
        <span class="section-icon">✂</span>
        <span>カット編集</span>
      </div>
      <div class="trim-timeline" id="trimTimeline">
        <div class="trim-track">
          <div class="trim-selected" id="trimSelected"></div>
          <div class="trim-handle trim-handle-start" id="trimHandleStart"></div>
          <div class="trim-handle trim-handle-end" id="trimHandleEnd"></div>
          <div class="trim-playhead" id="trimPlayhead"></div>
        </div>
      </div>
      <div class="trim-controls">
        <div class="trim-input-group">
          <label>開始</label>
          <input type="text" id="trimStart" value="0:00" placeholder="0:00">
        </div>
        <div class="trim-input-group">
          <label>終了</label>
          <input type="text" id="trimEnd" value="0:00" placeholder="0:00">
        </div>
        <button class="btn" id="trimPreviewBtn" title="選択範囲をプレビュー再生">▶ プレビュー</button>
        <button class="btn btn-primary" id="trimSaveBtn" title="カットして新しい録画として保存">✂ カットして保存</button>
      </div>
    </div>

    <!-- Mosaic -->
    <div class="mosaic-section">
      <div class="section-header">
        <span class="section-icon">▦</span>
        <span>モザイク編集</span>
      </div>
      <p class="mosaic-hint" id="mosaicHint">動画を一時停止 → ペンツールでモザイクを自由に描画</p>
      <div class="mosaic-controls">
        <button class="btn" id="mosaicEditBtn" title="ペンツールで描画開始">✎ ペンツール</button>
        <button class="btn" id="mosaicDoneBtn" style="display:none">編集を終了</button>
        <div class="mosaic-brush-wrap" id="mosaicBrushWrap" style="display:none">
          <label>太さ</label>
          <input type="range" id="mosaicBrushSize" min="10" max="100" value="40">
        </div>
        <button class="btn" id="mosaicUndoBtn" disabled title="直前の描画を取り消し">↩ 戻す</button>
        <button class="btn" id="mosaicClearBtn" disabled title="モザイクをすべてクリア">クリア</button>
        <button class="btn btn-primary" id="mosaicSaveBtn" disabled title="モザイクを適用して新しい録画として保存">適用して保存</button>
      </div>
    </div>
  </div>

  <!-- ===== Saving Overlay ===== -->
  <div class="saving-overlay hidden" id="savingOverlay">
    <div class="saving-card">
      <div class="spinner"></div>
      <div class="saving-label" id="savingLabel">
        <span class="saving-text">保存中</span>
        <span class="saving-dots"><i></i><i></i><i></i></span>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
