<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Rec Controls</title>
  <link rel="stylesheet" href="/control.css">
</head>
<body>
  <div class="control-panel" id="controlPanel">
    <!-- Drag handle -->
    <div class="drag-handle"></div>

    <!-- Webcam preview -->
    <div class="webcam-circle" id="webcamCircle">
      <video id="webcamVideo" autoplay muted playsinline></video>
      <img id="iconImage" class="hidden" alt="">
      <span class="webcam-placeholder" id="webcamPlaceholder">off</span>
    </div>

    <!-- Mode tabs -->
    <div class="mode-row">
      <button class="mode-btn active" data-mode="camera">cam</button>
      <button class="mode-btn" data-mode="image">img</button>
      <button class="mode-btn" data-mode="none">off</button>
    </div>

    <!-- Audio toggles -->
    <div class="audio-row">
      <button class="toggle-btn active" id="micToggle" title="マイク">
        <span class="dot"></span> Mic
      </button>
      <button class="toggle-btn active" id="sysAudioToggle" title="PC音声">
        <span class="dot"></span> Sys
      </button>
    </div>

    <!-- Record button + timer -->
    <div class="record-row">
      <button class="rec-btn" id="recordBtn" title="録画開始/停止">
        <span class="rec-inner"></span>
      </button>
      <span class="timer" id="timer"></span>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Countdown overlay -->
    <div class="countdown hidden" id="countdown">3</div>
  </div>

  <input type="file" accept="image/*" id="imageInput" class="hidden">
  <script src="/control.js"></script>
</body>
</html>
